const TODAY = new Date("2026-04-26");
const PERIODS = [
  {label:"Last 7 days",  days:7},
  {label:"Last 30 days", days:30},
  {label:"This month",   thisMonth:true},
  {label:"Last 60 days", days:60},
  {label:"Last 90 days", days:90},
  {label:"All time"}
];

function daysAgo(n) { const d=new Date(TODAY); d.setDate(d.getDate()-n); return d; }
function fmt$(n)    { return n ? "$"+Math.round(n).toLocaleString() : "—"; }
function pct(a,b)   { return b ? Math.round((a/b)*100)+"%" : "0%"; }

function filterWeeks(period) {
  if (!period.days && !period.thisMonth) return weeklyData;
  const cutoff = period.thisMonth ? new Date(TODAY.getFullYear(), TODAY.getMonth(), 1) : daysAgo(period.days);
  return weeklyData.filter(w => new Date(w.week) >= cutoff);
}
function filterQuotes(period) {
  if (!period.days && !period.thisMonth) return quotes;
  const cutoff = period.thisMonth ? new Date(TODAY.getFullYear(), TODAY.getMonth(), 1) : daysAgo(period.days);
  return quotes.filter(q => new Date(q.date) >= cutoff);
}
function sumWeeks(weeks, key) {
  return weeks.reduce((acc, w) => {
    const d = w[key];
    acc.calls  += d.calls  || 0;
    acc.conn   += d.conn   || 0;
    acc.pos    += d.pos    || 0;
    acc.neg    += d.neg    || 0;
    acc.email  += d.email  || 0;
    acc.deals  += d.deals  || 0;
    acc.mov    += d.mov    || 0;
    return acc;
  }, {calls:0,conn:0,pos:0,neg:0,email:0,deals:0,mov:0});
}

  );
}

            React.createElement('thead', null, React.createElement('tr', null,
              React.createElement('th', {style:{...thS,width:"40%"}}, "Stage"),
              React.createElement('th', {style:{...thS,textAlign:"right"}}, "Deals"),
              React.createElement('th', {style:{...thS,textAlign:"right"}}, "Share"),
              React.createElement('th', {style:{...thS,width:"35%"}})
            )),
            React.createElement('tbody', null,
              ...p.stages.filter(s=>s.deals>0).map((s,i,arr) => {
                const max=Math.max(...arr.map(x=>x.deals));
                const isRed=s.highlight==="red", isGreen=s.highlight==="green";
                const nameColor=isRed?"#A32D2D":isGreen?"#3B6D11":"var(--text-primary)";
                const barColor=isRed?"#E24B4A":isGreen?"#639922":p.color;
                const isFirst=i===0, isLast=i===arr.filter(x=>x.deals>0).length-1;
                return React.createElement('tr', {key:s.name, style:{borderBottom:"1px solid var(--border)"}},
                  React.createElement('td', {style:{padding:"7px 12px"}},
                    React.createElement('div', {style:{display:"flex",alignItems:"center",gap:8}},
                      React.createElement('div', {style:{display:"flex",flexDirection:"column",alignItems:"center",width:16,flexShrink:0}},
                        isFirst ? React.createElement('span', {style:{fontSize:13}}, "▽") :
                        isLast  ? React.createElement('span', {style:{fontSize:11,color:nameColor}}, "▼") :
                                  React.createElement('span', {style:{fontSize:10,color:"var(--text-secondary)"}}, "│")
                      ),
                      React.createElement('span', {style:{color:nameColor,fontWeight:isRed||isGreen?500:400}}, s.name)
                    )
                  ),
                  React.createElement('td', {style:{padding:"7px 12px",textAlign:"right",fontWeight:500,color:nameColor}}, s.deals),
                  React.createElement('td', {style:{padding:"7px 12px",textAlign:"right",color:"var(--text-secondary)",fontSize:12}}, Math.round((s.deals/p.total)*100)+"%"),
                  React.createElement('td', {style:{padding:"7px 12px"}},
                    React.createElement('div', {style:{height:8,background:"var(--bg-secondary)",borderRadius:4,overflow:"hidden"}},
                      React.createElement('div', {style:{height:"100%",width:Math.round((s.deals/max)*100)+"%",background:barColor,opacity:0.8,borderRadius:4}})
                    )
                  )
                );
              })
            )
          )
        )
      )),
      React.createElement(ST, null, "Deals by service line"),
      React.createElement('div', {style:{background:"var(--bg-primary)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden",marginBottom:"1rem"}},
        React.createElement('table', {style:{width:"100%",fontSize:13}},
          React.createElement('thead', null, React.createElement('tr', null,
            ...["Service","Deals","Deal movement","Move rate","Tasks"].map(h =>
              React.createElement('th', {key:h, style:{...thS,textAlign:h==="Service"?"left":"right"}}, h)
            )
          )),
          React.createElement('tbody', null,
            ...serviceLines.map((s,i) => {
              const rate=Math.round((s.movement/s.deals)*100), meta=SVC_META[s.svc]||{color:"#888"};
              return React.createElement('tr', {key:i, style:{borderBottom:"1px solid var(--border)"}},
                React.createElement('td', {style:{padding:"8px 12px"}}, s.label),
                React.createElement('td', {style:{padding:"8px 12px",textAlign:"right",fontWeight:500}}, s.deals),
                React.createElement('td', {style:{padding:"8px 12px",textAlign:"right"}}, s.movement),
                React.createElement('td', {style:{padding:"8px 12px",textAlign:"right"}},
                  React.createElement('span', {style:{fontWeight:500}}, rate+"%"),
                  React.createElement('span', {style:{display:"inline-block",width:rate*0.4,height:6,borderRadius:3,background:meta.color,verticalAlign:"middle",marginLeft:6}})
                ),
                React.createElement('td', {style:{padding:"8px 12px",textAlign:"right",color:"var(--text-secondary)"}}, s.tasks)
              );
            }),
            React.createElement('tr', null,
              ...["Total","139","93","67%","139"].map((v,i) =>
                React.createElement('td', {key:i, style:{padding:"8px 12px",textAlign:i===0?"left":"right",fontWeight:500,borderTop:"1px solid var(--border)"}}, v)
              )
            )
          )
        )
      ),
      React.createElement(ST, null, "Deal volume by service"),
      React.createElement('div', {style:{background:"var(--bg-primary)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"1rem 1.1rem"}},
        ...serviceLines.map(s => {
          const meta=SVC_META[s.svc]||{color:"#888"}, max=Math.max(...serviceLines.map(x=>x.deals));
          return React.createElement(BarRow, {key:s.svc,label:s.label,value:s.deals,max:max,color:meta.color,meta:Math.round(s.movement/s.deals*100)+"% movement"});
        })
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
