    month: d.getMonth()
  });
  d = new Date(d.getFullYear(), d.getMonth()+1, 1);

function fmt$(n){return n?"$"+Math.round(n).toLocaleString():"—";}
function pct(a,b){return b?Math.round((a/b)*100)+"%":"0%";}
function fmtWeek(w){if(!w)return"—";const d=new Date(w);return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}

function filterByPeriod(items, dateKey, period) {
  if (period.type === "alltime") return items;
  if (period.type === "days") {
    const cutoff = new Date(TODAY); cutoff.setDate(cutoff.getDate()-period.days);
    return items.filter(i => new Date(i[dateKey]) >= cutoff);
  }
  if (period.type === "month") {
    return items.filter(i => {
      const d = new Date(i[dateKey]);
      return d.getFullYear()===period.year && d.getMonth()===period.month;
    });
  }
  return items;
}

function filterWeeks(period) {
  if (period.type === "alltime") return weeklyData;
  if (period.type === "days") {
    const cutoff = new Date(TODAY); cutoff.setDate(cutoff.getDate()-period.days);
    return weeklyData.filter(w => new Date(w.week) >= cutoff);
  }
  if (period.type === "month") {
    return weeklyData.filter(w => {
      const d = new Date(w.week);
      return d.getFullYear()===period.year && d.getMonth()===period.month;
    });
  }
  return weeklyData;
}

function sumWeeks(weeks, key) {
  return weeks.reduce((acc,w) => {
    const d=w[key];
    acc.calls+=d.calls||0; acc.conn+=d.conn||0; acc.pos+=d.pos||0;
    acc.neg+=d.neg||0; acc.email+=d.email||0; acc.deals+=d.deals||0; acc.mov+=d.mov||0;
    return acc;
  },{calls:0,conn:0,pos:0,neg:0,email:0,deals:0,mov:0});
}
