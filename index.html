const TODAY = new Date("2026-04-16");
const PERIODS = [
  {label:"Last 7 days",  days:7},
  {label:"Last 30 days", days:30},
  {label:"This month",   thisMonth:true},
  {label:"Last 60 days", days:60},
  {label:"Last 90 days", days:90},
  {label:"All time"},
];

function daysAgo(n) { const d=new Date(TODAY); d.setDate(d.getDate()-n); return d; }
function fmt$(n)    { return n ? "$"+Math.round(n).toLocaleString() : "—"; }
function pct(a,b)   { return b ? Math.round((a/b)*100)+"%" : "0%"; }

function filterWeeks(period) {
  if (!period.days && !period.thisMonth) return weeklyData;
  const cutoff = period.thisMonth
    ? new Date(TODAY.getFullYear(), TODAY.getMonth(), 1)
    : daysAgo(period.days);
  return weeklyData.filter(w => new Date(w.week) >= cutoff);
}
function filterQuotes(period) {
  if (!period.days && !period.thisMonth) return quotes;
  const cutoff = period.thisMonth
    ? new Date(TODAY.getFullYear(), TODAY.getMonth(), 1)
    : daysAgo(period.days);
  return quotes.filter(q => new Date(q.date) >= cutoff);
}
function sumWeeks(weeks, key) {
  return weeks.reduce((acc, w) => {
    const d = w[key];
    acc.calls  += d.calls  || 0;
    acc.conn   += d.conn   || 0;
    acc.pos    += d.pos    || 0;
    acc.neg    += d.neg    || 0;
    acc.email  += d.email  || 0;
    acc.deals  += d.deals  || 0;
    acc.mov    += d.mov    || 0;
    return acc;
  }, {calls:0, conn:0, pos:0, neg:0, email:0, deals:0, mov:0});
}

function Card({label, value, sub, vc}) {
  return <div style={{background:"var(--bg-secondary)",borderRadius:"var(--radius-md)",padding:"0.85rem 1rem"}}>
    <div style={{fontSize:12,color:"var(--text-secondary)",marginBottom:4}}>{label}</div>
    <div style={{fontSize:20,fontWeight:500,color:vc||"var(--text-primary)"}}>{value}</div>
    {sub && <div style={{fontSize:12,color:"var(--text-secondary)",marginTop:2}}>{sub}</div>}
  </div>;
}
function ST({children}) {
  return <div style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",textTransform:"uppercase",letterSpacing:"0.05em",margin:"1.75rem 0 0.75rem"}}>{children}</div>;
}
function FB({options, active, onChange}) {
  return <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:"0.75rem"}}>
    {options.map((o,i) => <button key={i} onClick={()=>onChange(o)} style={{fontSize:12,padding:"4px 14px",borderRadius:999,border:`1px solid ${active===o?"#888":"#ccc"}`,background:active===o?"var(--bg-secondary)":"transparent",color:active===o?"var(--text-primary)":"var(--text-secondary)",fontWeight:active===o?500:400}}>{o}</button>)}
  </div>;
}
function BarRow({label, value, max, color, meta}) {
  const p = max > 0 ? Math.round((value/max)*100) : 0;
  return <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
    <div style={{fontSize:12,color:"var(--text-secondary)",width:140,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</div>
    <div style={{flex:1,height:16,background:"var(--bg-secondary)",borderRadius:4,overflow:"hidden"}}>
      <div style={{height:"100%",width:p+"%",background:color,borderRadius:4}}/>
    </div>
    <div style={{fontSize:12,fontWeight:500,color:"var(--text-primary)",width:90,textAlign:"right",flexShrink:0}}>{meta}</div>
  </div>;
}
function SellerCard({seller, data}) {
  const av = AVATARS[seller];
  const pickup  = data.calls > 0 ? Math.round((data.conn  / data.calls) * 100) : 0;
  const posRate  = data.conn  > 0 ? Math.round((data.pos   / data.conn)  * 100) : 0;
  const dealRate = data.conn  > 0 ? Math.round((data.deals / data.conn)  * 100) : 0;
  return <div style={{background:"var(--bg-primary)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"1rem 1.1rem"}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,fontSize:14,fontWeight:500}}>
      <div style={{width:28,height:28,borderRadius:"50%",background:av.bg,color:av.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500}}>{av.initials}</div>
      {seller}
    </div>
    {[
      ["Calls logged",   data.calls.toLocaleString()],
      ["Connected",      data.conn.toLocaleString()],
      ["Pickup rate",    pickup+"%"],
      ["Positive",       `${data.pos} (${posRate}%)`],
      ["Negative",       data.neg],
      ["Asked email",    data.email],
      ["Deals created",  data.deals],
      ["Deal movement",  data.mov],
      ["Pickup → deal",  dealRate+"%"],
    ].map(([l,v]) => (
      <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid var(--border)",fontSize:13}}>
        <span style={{color:"var(--text-secondary)"}}>{l}</span>
        <span style={{fontWeight:500}}>{v}</span>
      </div>
    ))}
    <div style={{marginTop:8,height:6,borderRadius:3,background:"var(--bg-secondary)",overflow:"hidden"}}>
      <div style={{height:"100%",width:pickup+"%",background:COLORS[seller],borderRadius:3}}/>
    </div>
  </div>;
}

            <tbody>
              {serviceLines.map((s,i) => {
                const rate=Math.round((s.movement/s.deals)*100), meta=SVC_META[s.svc]||{color:"#888"};
                return <tr key={i} style={{borderBottom:"1px solid var(--border)"}}>
                  <td style={{padding:"8px 12px"}}>{s.label}</td>
                  <td style={{padding:"8px 12px",textAlign:"right",fontWeight:500}}>{s.deals}</td>
                  <td style={{padding:"8px 12px",textAlign:"right"}}>{s.movement}</td>
                  <td style={{padding:"8px 12px",textAlign:"right"}}>
                    <span style={{fontWeight:500}}>{rate}%</span>
                    <span style={{display:"inline-block",width:rate*0.4,height:6,borderRadius:3,background:meta.color,verticalAlign:"middle",marginLeft:6}}/>
                  </td>
                  <td style={{padding:"8px 12px",textAlign:"right",color:"var(--text-secondary)"}}>{s.tasks}</td>
                </tr>;
              })}
              <tr>{["Total","139","93","67%","139"].map((v,i)=><td key={i} style={{padding:"8px 12px",textAlign:i===0?"left":"right",fontWeight:500,borderTop:"1px solid var(--border)"}}>{v}</td>)}</tr>
            </tbody>
          </table>
        </div>
        <ST>Deal volume by service</ST>
        <div style={{background:"var(--bg-primary)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"1rem 1.1rem"}}>
          {serviceLines.map(s => {
            const meta=SVC_META[s.svc]||{color:"#888"}, max=Math.max(...serviceLines.map(x=>x.deals));
            return <BarRow key={s.svc} label={s.label} value={s.deals} max={max} color={meta.color} meta={Math.round(s.movement/s.deals*100)+"% movement"}/>;
          })}
        </div>
      </div>}

      
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
